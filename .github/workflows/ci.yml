name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache upstream BSG-BATS package
        id: cache-bsgbat
        uses: actions/cache@v4
        with:
          path: ~/.cache/bsg-bats-fr
          key: bsgbat-zip-v0.21-md5-2c61c47394941d6429600fd7089058b7

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]" || pip install -e .
          pip install pytest

      - name: Run smoke test (downloads ~448 MB from Zenodo on cache miss)
        run: pytest -v tests/

      - name: Emit a demo SINP payload (artifact)
        run: |
          python -m bsg_bats_fr.cli \
            ~/.cache/bsg-bats-fr/bsgbat/data/example1.wav \
            --observer "ci-demo" \
            --date "2026-04-14T22:00:00+02:00" \
            --lat 47.3220 --lon 5.0415 \
            --output example1.sinp.json
          cat example1.sinp.json

      - name: Upload demo SINP payload
        uses: actions/upload-artifact@v4
        with:
          name: example1-sinp-payload
          path: example1.sinp.json
